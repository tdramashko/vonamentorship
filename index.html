<!DOCTYPE html>
<html lang="uk">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>План менторства · Senior QA Path</title>
<link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #0a0a0f;
    --paper: #f5f2eb;
    --accent: #e8600a;
    --accent2: #1a3a5c;
    --muted: #8a8478;
    --line: #d4cfc4;
    --stage1: #e8600a;
    --stage2: #2d7dd2;
    --stage3: #2a9d5c;
    --stage4: #9b4dca;
    --stage5: #c0392b;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'Raleway', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* HEADER */
  .header {
    background: var(--ink);
    color: var(--paper);
    padding: 60px 48px 48px;
    position: relative;
    overflow: hidden;
  }

  .header::before {
    content: 'QA';
    position: absolute;
    right: -20px;
    top: -30px;
    font-size: 220px;
    font-weight: 800;
    color: rgba(255,255,255,0.04);
    line-height: 1;
    pointer-events: none;
    font-family: 'Raleway', sans-serif;
  }

  .header-tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .header-tag::before {
    content: '';
    display: block;
    width: 32px;
    height: 2px;
    background: var(--accent);
  }

  h1 {
    font-size: clamp(32px, 5vw, 56px);
    font-weight: 800;
    line-height: 1.05;
    letter-spacing: -0.02em;
    margin-bottom: 24px;
  }

  h1 span {
    color: var(--accent);
  }

  .header-meta {
    display: flex;
    gap: 32px;
    flex-wrap: wrap;
    margin-top: 32px;
    border-top: 1px solid rgba(255,255,255,0.1);
    padding-top: 24px;
  }

  .meta-item {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .meta-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: var(--muted);
  }

  .meta-value {
    font-size: 15px;
    font-weight: 600;
    color: var(--paper);
  }

  /* NORTH STAR */
  .north-star {
    background: var(--accent);
    color: white;
    padding: 40px 48px;
    position: relative;
    overflow: hidden;
  }

  .north-star::after {
    content: '★';
    position: absolute;
    right: 40px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 80px;
    opacity: 0.15;
  }

  .ns-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    opacity: 0.8;
    margin-bottom: 12px;
  }

  .ns-text {
    font-size: clamp(15px, 2.5vw, 18px);
    font-weight: 600;
    line-height: 1.5;
    max-width: 740px;
  }

  .ns-text strong {
    background: rgba(255,255,255,0.25);
    padding: 1px 6px;
    border-radius: 3px;
  }

  /* MAIN CONTENT */
  .content {
    padding: 56px 48px;
    max-width: 1100px;
  }

  .section-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    color: var(--muted);
    margin-bottom: 32px;
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--line);
    max-width: 300px;
  }

  /* ROADMAP */
  .roadmap {
    display: flex;
    flex-direction: column;
    gap: 0;
    margin-bottom: 64px;
    position: relative;
  }

  .roadmap::before {
    content: '';
    position: absolute;
    left: 28px;
    top: 40px;
    bottom: 40px;
    width: 2px;
    background: var(--line);
  }

  .stage {
    position: relative;
    margin-bottom: 8px;
  }

  .stage-header {
    display: flex;
    align-items: center;
    gap: 20px;
    padding: 20px 0 12px;
    cursor: pointer;
  }

  .stage-num {
    width: 58px;
    height: 58px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 800;
    font-size: 13px;
    font-family: 'JetBrains Mono', monospace;
    flex-shrink: 0;
    position: relative;
    z-index: 1;
    transition: transform 0.2s;
  }

  .stage:hover .stage-num { transform: scale(1.08); }

  .stage-label {
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    opacity: 0.6;
    display: block;
    margin-bottom: 2px;
  }

  .stage-name {
    font-size: 20px;
    font-weight: 700;
  }

  /* Stage colors */
  .s1 .stage-num { background: var(--stage1); color: white; }
  .s2 .stage-num { background: var(--stage2); color: white; }
  .s3 .stage-num { background: var(--stage3); color: white; }
  .s4 .stage-num { background: var(--stage4); color: white; }
  .s5 .stage-num { background: var(--stage5); color: white; }

  .s1 .stage-name { color: var(--stage1); }
  .s2 .stage-name { color: var(--stage2); }
  .s3 .stage-name { color: var(--stage3); }
  .s4 .stage-name { color: var(--stage4); }
  .s5 .stage-name { color: var(--stage5); }

  .meetings {
    margin-left: 78px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    padding-bottom: 16px;
  }

  .meeting-card {
    background: white;
    border-radius: 10px;
    padding: 20px 24px;
    display: grid;
    grid-template-columns: 44px 1fr auto;
    gap: 16px;
    align-items: start;
    border: 1px solid var(--line);
    transition: box-shadow 0.2s, transform 0.2s;
    animation: fadeSlide 0.4s ease both;
  }

  @keyframes fadeSlide {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .meeting-card:hover {
    box-shadow: 0 6px 24px rgba(0,0,0,0.08);
    transform: translateX(4px);
  }

  .meeting-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 22px;
    font-weight: 500;
    color: var(--line);
    line-height: 1;
    padding-top: 2px;
  }

  .meeting-title {
    font-size: 16px;
    font-weight: 700;
    margin-bottom: 6px;
  }

  .meeting-desc {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.5;
  }

  .meeting-badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    padding: 4px 10px;
    border-radius: 20px;
    white-space: nowrap;
    font-weight: 500;
    margin-top: 2px;
  }

  .s1 .meeting-badge { background: rgba(232,96,10,0.1); color: var(--stage1); }
  .s2 .meeting-badge { background: rgba(45,125,210,0.1); color: var(--stage2); }
  .s3 .meeting-badge { background: rgba(42,157,92,0.1); color: var(--stage3); }
  .s4 .meeting-badge { background: rgba(155,77,202,0.1); color: var(--stage4); }
  .s5 .meeting-badge { background: rgba(192,57,43,0.1); color: var(--stage5); }

  .deliverable {
    grid-column: 2 / -1;
    background: var(--paper);
    border-radius: 6px;
    padding: 10px 14px;
    font-size: 12px;
    color: var(--ink);
    border-left: 3px solid var(--line);
    margin-top: 4px;
  }

  .deliverable strong {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    display: block;
    margin-bottom: 3px;
  }

  /* QUESTIONS */
  .questions-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 64px;
  }

  .q-card {
    background: white;
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 24px;
    position: relative;
    transition: box-shadow 0.2s;
  }

  .q-card:hover {
    box-shadow: 0 4px 20px rgba(0,0,0,0.07);
  }

  .q-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    font-weight: 600;
    margin-bottom: 8px;
  }

  .q-topic {
    font-size: 13px;
    font-weight: 700;
    color: var(--accent2);
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .q-text {
    font-size: 14px;
    line-height: 1.6;
    color: #333;
  }

  /* GOALS */
  .goals-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    margin-bottom: 64px;
  }

  .goal-card {
    padding: 28px 24px;
    border-radius: 10px;
    border: 1px solid var(--line);
    background: white;
    position: relative;
    overflow: hidden;
    transition: transform 0.2s;
  }

  .goal-card:hover { transform: translateY(-3px); }

  .goal-icon {
    font-size: 32px;
    margin-bottom: 16px;
  }

  .goal-title {
    font-size: 14px;
    font-weight: 700;
    margin-bottom: 8px;
    color: var(--ink);
  }

  .goal-desc {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.55;
  }

  /* TIMELINE BAR */
  .timeline-bar {
    background: white;
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 28px 32px;
    margin-bottom: 64px;
  }

  .timeline-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: var(--muted);
    margin-bottom: 20px;
  }

  .tl-track {
    display: flex;
    height: 12px;
    border-radius: 6px;
    overflow: hidden;
    margin-bottom: 12px;
  }

  .tl-seg {
    height: 100%;
    transition: flex 0.3s;
  }

  .tl-labels {
    display: flex;
    gap: 0;
  }

  .tl-ll {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    margin-right: 20px;
    white-space: nowrap;
  }

  .tl-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* TIP BOX */
  .tip-box {
    background: var(--ink);
    color: var(--paper);
    border-radius: 10px;
    padding: 28px 32px;
    display: flex;
    gap: 20px;
    align-items: flex-start;
    margin-bottom: 48px;
  }

  .tip-icon {
    font-size: 28px;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .tip-text {
    font-size: 14px;
    line-height: 1.7;
    color: rgba(245,242,235,0.85);
  }

  .tip-text strong {
    color: var(--accent);
  }

  /* FOOTER */
  .footer {
    border-top: 1px solid var(--line);
    padding: 24px 48px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }

  @media (max-width: 700px) {
    .header, .content, .footer { padding-left: 24px; padding-right: 24px; }
    .north-star { padding: 32px 24px; }
    .questions-grid, .goals-row { grid-template-columns: 1fr; }
    .meeting-card { grid-template-columns: 36px 1fr; }
    .meeting-badge { display: none; }
    .meetings { margin-left: 46px; }
    .roadmap::before { left: 18px; }
    .tl-labels { flex-wrap: wrap; }
  }
  /* SUMMARY BLOCK */
  .summary-block {
    background: var(--ink);
    color: var(--paper);
    border-radius: 12px;
    padding: 36px 40px;
    display: grid;
    grid-template-columns: 1fr auto;
    grid-template-rows: auto auto;
    gap: 24px 40px;
    margin-bottom: 48px;
    align-items: start;
  }

  .summary-left { grid-column: 1; grid-row: 1; }
  .summary-right {
    grid-column: 2; grid-row: 1;
    display: flex;
    gap: 28px;
    align-items: flex-start;
  }
  .summary-desc {
    grid-column: 1 / -1; grid-row: 2;
    font-size: 15px;
    line-height: 1.7;
    color: rgba(245,242,235,0.75);
    border-top: 1px solid rgba(255,255,255,0.1);
    padding-top: 20px;
  }
  .summary-desc strong { color: var(--accent); }

  .summary-name {
    font-size: 26px;
    font-weight: 800;
    letter-spacing: -0.02em;
    margin-bottom: 4px;
  }

  .summary-role {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: var(--accent);
    margin-bottom: 16px;
  }

  .summary-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .stag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    padding: 4px 10px;
    border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.15);
    color: rgba(245,242,235,0.7);
    letter-spacing: 0.05em;
  }

  .summary-stat {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }

  .sstat-val {
    font-size: 30px;
    font-weight: 800;
    letter-spacing: -0.03em;
    color: var(--paper);
    line-height: 1;
  }

  .sstat-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: rgba(245,242,235,0.4);
    white-space: nowrap;
  }

  @media (max-width: 700px) {
    .summary-block { grid-template-columns: 1fr; }
    .summary-right { grid-column: 1; grid-row: 2; flex-wrap: wrap; }
    .summary-desc { grid-row: 3; }
  }

</style>

<style>
  /* LOCK SCREEN */
  #lock-screen {
    position: fixed; inset: 0; z-index: 9999;
    display: flex; align-items: center; justify-content: center;
    background: linear-gradient(135deg, #0a0a0f 0%, #1a3a5c 50%, #0a0a0f 100%);
    background-size: 400% 400%;
    animation: gradientShift 8s ease infinite;
  }
  @keyframes gradientShift {
    0%   { background-position: 0% 50%; }
    50%  { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }
  #lock-screen::before {
    content: '';
    position: absolute; inset: 0;
    background-image:
      radial-gradient(circle at 20% 50%, rgba(232,96,10,0.12) 0%, transparent 50%),
      radial-gradient(circle at 80% 20%, rgba(45,125,210,0.12) 0%, transparent 50%),
      radial-gradient(circle at 50% 80%, rgba(42,157,92,0.08) 0%, transparent 40%);
  }
  #lock-box {
    position: relative;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.1);
    backdrop-filter: blur(20px);
    border-radius: 16px;
    padding: 48px 40px;
    width: 100%;
    max-width: 380px;
    text-align: center;
    box-shadow: 0 32px 80px rgba(0,0,0,0.5);
  }
  #lock-icon {
    font-size: 40px;
    margin-bottom: 20px;
    display: block;
    opacity: 0.9;
  }
  #lock-box h2 {
    font-family: 'Raleway', sans-serif;
    font-size: 22px;
    font-weight: 700;
    color: #f5f2eb;
    margin-bottom: 6px;
    letter-spacing: -0.01em;
  }
  #lock-box p {
    font-family: 'Raleway', sans-serif;
    font-size: 13px;
    color: rgba(245,242,235,0.45);
    margin-bottom: 32px;
  }
  #pwd-input {
    width: 100%;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 8px;
    color: #f5f2eb;
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    padding: 14px 16px;
    outline: none;
    transition: border-color 0.2s;
    text-align: center;
    letter-spacing: 0.05em;
    margin-bottom: 14px;
  }
  #pwd-input:focus { border-color: rgba(232,96,10,0.6); }
  #pwd-input.error { border-color: rgba(192,57,43,0.8); animation: shake 0.3s ease; }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    25%     { transform: translateX(-6px); }
    75%     { transform: translateX(6px); }
  }
  #unlock-btn {
    width: 100%;
    background: #e8600a;
    border: none;
    border-radius: 8px;
    color: white;
    font-family: 'Raleway', sans-serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    padding: 14px;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
  }
  #unlock-btn:hover  { background: #d4540a; }
  #unlock-btn:active { transform: scale(0.98); }
  #error-msg {
    margin-top: 12px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: #c0392b;
    min-height: 16px;
  }
  #main-content { display: none; }
</style>
</head>
<body>

<div id="lock-screen">
  <div id="lock-box">
    <span id="lock-icon">🔒</span>
    <h2>Захищений контент</h2>
    <p>Введи пароль для доступу</p>
    <input id="pwd-input" type="password" placeholder="••••••••••••" autocomplete="current-password" />
    <button id="unlock-btn" onclick="unlock()">Увійти</button>
    <div id="error-msg"></div>
  </div>
</div>

async function unlock() {
  const pwd = document.getElementById('pwd-input').value;
  const input = document.getElementById('pwd-input');
  const errMsg = document.getElementById('error-msg');
  errMsg.textContent = '';

  try {
    const salt = base64ToBytes(PAYLOAD.salt);
    const iv   = base64ToBytes(PAYLOAD.iv);
    const tag  = base64ToBytes(PAYLOAD.tag);
    const data = base64ToBytes(PAYLOAD.data);

    // Derive key
    const rawKey = await crypto.subtle.importKey('raw', new TextEncoder().encode(pwd), 'PBKDF2', false, ['deriveKey']);
    const aesKey = await crypto.subtle.deriveKey(
      { name: 'PBKDF2', salt, iterations: 100000, hash: 'SHA-256' },
      rawKey,
      { name: 'AES-GCM', length: 256 },
      false, ['decrypt']
    );

    // Combine data + tag for AES-GCM
    const combined = new Uint8Array(data.length + tag.length);
    combined.set(data); combined.set(tag, data.length);

    const decrypted = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, aesKey, combined);
    const html = new TextDecoder().decode(decrypted);

    document.getElementById('main-content').innerHTML = html;
    document.getElementById('main-content').style.display = 'block';
    document.getElementById('lock-screen').style.display = 'none';
  } catch {
    input.classList.add('error');
    setTimeout(() => input.classList.remove('error'), 500);
    errMsg.textContent = 'Невірний пароль';
    input.value = '';
    input.focus();
  }
}

function base64ToBytes(b64) {
  return Uint8Array.from(atob(b64), c => c.charCodeAt(0));
}

document.getElementById('pwd-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') unlock();
});
</script>
